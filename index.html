<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; }
        
        body {
            background: black;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        
        .slideshow {
            position: relative;
            width: 100%;
            height: 100%;
        }
        
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }
        
        .slide.active {
            opacity: 1;
        }
        
        .progress-bar {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 8px;
            background: rgba(255,255,255,0.15);
            border-radius: 4px;
            z-index: 10;
        }
        
        .progress {
            height: 100%;
            background: #4CAF50;
            border-radius: 4px;
            width: 0%;
            transition: width 0.3s;
            box-shadow: 0 0 10px rgba(76,175,80,0.5);
        }
    </style>
</head>
<body>
    <div class="slideshow">
        <img class="slide active" src="img1.png" alt="">
        <img class="slide" src="img2.png" alt="">
        <img class="slide" src="img3.png" alt="">
        <img class="slide" src="img4.png" alt="">
    </div>
    
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>

    <script>
        // Слайдшоу
        var slides = document.querySelectorAll('.slide');
        var currentSlide = 0;
        
        setInterval(function() {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }, 10000);
        
        // Прогресс скачивания
        window.SetFilesTotal = function(total) {
            window.totalFiles = total;
        };
        
        window.SetFilesNeeded = function(needed) {
            if (window.totalFiles) {
                var percent = ((window.totalFiles - needed) / window.totalFiles) * 100;
                document.getElementById('progress').style.width = percent + '%';
            }
        };
    </script>
</body>
</html>
