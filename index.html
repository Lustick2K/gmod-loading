<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; }
        
        body {
            background: black;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        
        .slideshow {
            position: relative;
            width: 100%;
            height: 100%;
        }
        
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }
        
        .slide.active {
            opacity: 1;
        }
        
        .info {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
        }
        
        .progress-bar {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            z-index: 10;
        }
        
        .progress {
            height: 100%;
            background: #4CAF50;
            border-radius: 3px;
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div class="slideshow">
        <img class="slide active" src="img1.jpg" alt="">
        <img class="slide" src="img2.jpg" alt="">
        <img class="slide" src="img3.jpg" alt="">
        <img class="slide" src="img4.jpg" alt="">
    </div>
    
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>
    
    <div class="info">
        <div id="status">Загрузка...</div>
        <div id="server-name" style="font-size: 18px; margin-top: 10px; opacity: 0.8;"></div>
    </div>

    <script>
        var slides = document.querySelectorAll('.slide');
        var currentSlide = 0;
        
        setInterval(function() {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }, 4000);
        
        window.GameDetails = function(servername, serverurl, mapname, maxplayers, steamid, gamemode) {
            document.getElementById('server-name').innerText = servername;
        };
        
        window.SetStatusChanged = function(status) {
            document.getElementById('status').innerText = status;
        };
        
        window.SetFilesTotal = function(total) {
            window.totalFiles = total;
        };
        
        window.SetFilesNeeded = function(needed) {
            if (window.totalFiles) {
                var percent = ((window.totalFiles - needed) / window.totalFiles) * 100;
                document.getElementById('progress').style.width = percent + '%';
            }
        };
        
        window.DownloadingFile = function(fileName) {
            document.getElementById('status').innerText = 'Скачивание: ' + fileName;
        };
    </script>
</body>
</html>
